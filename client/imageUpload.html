<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Datei Ablage</title>
    <link rel="stylesheet" href="css/imageUpload.css">
</head>
<body>
    <script src="js/imageUpload.js" defer></script>

    <div id="wrapper">
        <div id="head" class="outerWrapper">
            <h1 id="heading">Datei Ablage</h1>
        </div>

        <div id="body" class="outerWrapper">
            <div id="pathWrapper">
                <input type="text" placeholder="Path" id="pathInput">
                <button id="saveButton">Save</button>
            </div>
            <label id="dropZone">
                <input type="file" id="fileInput" accept="image/*" multiple>
                <span id="dropLabel">Bilder auswählen oder hierher ziehen</span>
            </label>
            <div id="preview"></div>
            <div id="buttonWrapper">
                <button id="sendButton" onclick="sendData()">Send</button>
                <button id="clearButton" onclick="clearPreview()">Clear</button>
            </div>
        </div>
    </div>

</body>
</html>
